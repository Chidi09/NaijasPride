<nav
  class="fixed top-0 w-full z-50 transition-colors duration-300"
  [ngClass]="scrolled ? 'bg-black/95 shadow-lg' : 'bg-gradient-to-b from-black/80 to-transparent'"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
      <div class="flex items-center gap-10">
        <a routerLink="/" class="flex-shrink-0 cursor-pointer overflow-visible self-start">
          <app-brand-logo
            variant="full"
            alt="NaijasPride"
            className="h-16 w-auto max-w-[320px] md:max-w-[500px] object-contain origin-top-left scale-[1.18] md:scale-[1.25] transition-transform hover:scale-[1.22] md:hover:scale-[1.3]"
          />
        </a>

        <div class="hidden md:flex items-baseline justify-center space-x-6 text-center">
          <a
            routerLink="/browse"
            routerLinkActive="text-white font-bold"
            class="text-gray-300 hover:text-white transition text-sm"
          >Home</a>
          <a
            routerLink="/movies"
            routerLinkActive="text-white font-bold"
            class="text-gray-300 hover:text-white transition text-sm"
          >Movies</a>
          <a
            routerLink="/books"
            routerLinkActive="text-white font-bold"
            class="text-gray-300 hover:text-white transition text-sm"
          >Books</a>

          <div class="relative group">
            <button class="text-gray-300 hover:text-white transition text-sm flex items-center gap-1">
              Categories <span class="text-[10px]">▼</span>
            </button>
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-48 bg-black/95 border border-gray-800 rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
              <a routerLink="/category/nollywood" class="block px-4 py-3 text-sm text-center text-gray-300 hover:bg-zinc-800 hover:text-white">Nollywood</a>
              <a routerLink="/category/bollywood" class="block px-4 py-3 text-sm text-center text-gray-300 hover:bg-zinc-800 hover:text-white">Bollywood</a>
              <a routerLink="/category/hollywood" class="block px-4 py-3 text-sm text-center text-gray-300 hover:bg-zinc-800 hover:text-white">AAA Hits</a>
            </div>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="relative group hidden md:flex items-center">
          <input
            type="text"
            placeholder="Titles, people, genres"
            class="bg-black/50 border border-white/30 rounded-none pl-3 pr-10 py-2 text-sm w-0 group-hover:w-64 focus:w-64 transition-all duration-300 text-white placeholder-gray-400 focus:outline-none focus:border-white h-10"
          >
          <span class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-lg leading-none">🔍</span>
        </div>

        <button class="text-white hover:text-gray-300 relative hidden md:block" type="button">
          🔔
          <span class="absolute top-0 right-0 h-2 w-2 bg-red-600 rounded-full"></span>
        </button>

        <div class="relative group cursor-pointer" *ngIf="auth.currentUser() as user; else loginBtn">
          <div class="h-8 w-8 rounded bg-zinc-700 flex items-center justify-center text-xs font-semibold uppercase">
            {{ user.email?.charAt(0) }}
          </div>

          <div class="absolute right-0 top-full mt-2 w-40 bg-black/95 border border-gray-800 rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
            <a routerLink="/profile" class="block px-4 py-3 text-sm text-gray-300 hover:bg-zinc-800 hover:text-white">Account</a>
            <a routerLink="/premium" class="block px-4 py-3 text-sm text-gray-300 hover:bg-zinc-800 hover:text-white">Plans</a>
            <div class="border-t border-gray-800 my-1"></div>
            <button (click)="auth.logout()" class="block w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-zinc-800">Sign Out</button>
          </div>
        </div>

        <ng-template #loginBtn>
          <a routerLink="/login" class="bg-red-600 hover:bg-red-700 text-white px-4 py-1.5 rounded font-medium text-sm transition">Sign In</a>
        </ng-template>

        <button
          type="button"
          (click)="mobileMenuOpen.set(!mobileMenuOpen())"
          class="md:hidden text-gray-300 hover:text-white"
        >
          ☰
        </button>
      </div>
    </div>

    <div *ngIf="mobileMenuOpen()" class="md:hidden bg-black/95 border-t border-gray-800 pb-4 space-y-1 text-center">
      <a routerLink="/browse" (click)="mobileMenuOpen.set(false)" class="block px-4 py-3 text-gray-300 hover:text-white hover:bg-white/5 transition-colors">Home</a>
      <a routerLink="/movies" (click)="mobileMenuOpen.set(false)" class="block px-4 py-3 text-gray-300 hover:text-white hover:bg-white/5 transition-colors">Movies</a>
      <a routerLink="/books" (click)="mobileMenuOpen.set(false)" class="block px-4 py-3 text-gray-300 hover:text-white hover:bg-white/5 transition-colors">Books</a>
      <div class="border-t border-gray-800 my-2"></div>
      <p class="px-4 text-xs text-gray-500 uppercase tracking-wider">Categories</p>
      <a routerLink="/category/nollywood" (click)="mobileMenuOpen.set(false)" class="block px-6 py-2 text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-colors">Nollywood</a>
      <a routerLink="/category/bollywood" (click)="mobileMenuOpen.set(false)" class="block px-6 py-2 text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-colors">Bollywood</a>
      <a routerLink="/category/hollywood" (click)="mobileMenuOpen.set(false)" class="block px-6 py-2 text-sm text-gray-400 hover:text-white hover:bg-white/5 transition-colors">AAA Hits</a>
    </div>
  </div>
</nav>

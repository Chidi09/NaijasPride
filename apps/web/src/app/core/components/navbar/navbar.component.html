<nav
  class="fixed top-0 inset-x-0 z-50 border-b transition-all duration-300"
  [ngClass]="scrolled ? 'backdrop-blur-md shadow-lg bg-white/95 border-black/15 dark:bg-black/95 dark:border-white/15' : 'bg-white/90 border-black/10 dark:bg-black/90 dark:border-white/10'"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="h-16 flex items-center justify-between gap-4">
      <a routerLink="/" class="flex-shrink-0 cursor-pointer overflow-visible">
        <app-brand-logo
          variant="full"
          alt="NaijasPride"
          className="h-11 md:h-12 w-auto min-w-[130px] object-contain"
        />
      </a>

      <div class="hidden md:flex items-center gap-8 text-sm tracking-[0.08em] text-black/70 dark:text-white/75">
        <a routerLink="/" routerLinkActive="text-black dark:text-white font-semibold" [routerLinkActiveOptions]="{ exact: true }" class="hover:text-black dark:hover:text-white transition-colors">Home</a>
        <a routerLink="/movies" routerLinkActive="text-black dark:text-white font-semibold" class="hover:text-black dark:hover:text-white transition-colors">Movies</a>
        <a routerLink="/tv-shows" routerLinkActive="text-black dark:text-white font-semibold" class="hover:text-black dark:hover:text-white transition-colors">TV Shows</a>
        <a routerLink="/anime" routerLinkActive="text-black dark:text-white font-semibold" class="hover:text-black dark:hover:text-white transition-colors">Anime</a>
        <a routerLink="/books" routerLinkActive="text-black dark:text-white font-semibold" class="hover:text-black dark:hover:text-white transition-colors">Books</a>
        <a routerLink="/music" routerLinkActive="text-black dark:text-white font-semibold" class="hover:text-black dark:hover:text-white transition-colors">Music</a>
      </div>

      <div class="flex items-center gap-2 md:gap-3">
        <button
          type="button"
          (click)="focusSearch()"
          class="inline-flex items-center justify-center h-9 w-9 rounded-md border border-black/20 text-black/75 hover:text-black hover:border-black/35 dark:border-white/20 dark:text-white/80 dark:hover:text-white dark:hover:border-white/40 transition-colors"
          aria-label="Search"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.3-4.3m1.3-5.7a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>

        <app-theme-toggle class="hidden md:block" />

        @if (auth.currentUser(); as user) {
          <div class="relative group hidden md:block">
            <button
              type="button"
              class="h-9 min-w-9 px-3 rounded-md border border-black/20 text-black/80 hover:border-black/35 hover:text-black dark:border-white/20 dark:text-white/85 dark:hover:border-white/40 dark:hover:text-white transition-colors text-sm"
            >
              {{ user.email?.charAt(0)?.toUpperCase() }}
            </button>

            <div class="absolute right-0 top-full mt-2 w-44 rounded-md border border-black/15 bg-white/95 dark:border-white/15 dark:bg-black/95 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
              <a routerLink="/profile" class="block px-4 py-3 text-sm text-black/75 hover:text-black hover:bg-black/5 dark:text-white/75 dark:hover:text-white dark:hover:bg-white/5">Profile</a>
              <a routerLink="/premium" class="block px-4 py-3 text-sm text-black/75 hover:text-black hover:bg-black/5 dark:text-white/75 dark:hover:text-white dark:hover:bg-white/5">Premium</a>
              <div class="border-t border-black/10 dark:border-white/10"></div>
              <button (click)="auth.logout()" class="block w-full text-left px-4 py-3 text-sm text-red-700 hover:text-red-800 hover:bg-black/5 dark:text-red-300 dark:hover:text-red-200 dark:hover:bg-white/5">Sign Out</button>
            </div>
          </div>
        } @else {
          <a routerLink="/login" class="hidden md:inline-flex items-center h-9 px-4 rounded-md bg-black text-white dark:bg-white dark:text-black text-sm font-semibold hover:opacity-90 transition-colors">Sign In</a>
        }

        <button
          type="button"
          (click)="mobileMenuOpen.set(!mobileMenuOpen())"
          class="md:hidden inline-flex items-center justify-center h-9 w-9 rounded-md border border-black/20 text-black/80 dark:border-white/20 dark:text-white/85"
          aria-label="Open menu"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  @if (mobileMenuOpen()) {
    <div class="md:hidden border-t border-black/10 bg-white/95 dark:border-white/10 dark:bg-black/95 backdrop-blur-md">
      <div class="px-4 py-3 flex flex-col text-black/80 dark:text-white/80">
        <div class="pb-2">
          <app-theme-toggle [compact]="true" />
        </div>
        <a routerLink="/" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Home</a>
        <a routerLink="/movies" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Movies</a>
        <a routerLink="/tv-shows" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">TV Shows</a>
        <a routerLink="/anime" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Anime</a>
        <a routerLink="/books" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Books</a>
        <a routerLink="/music" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Music</a>
        <a routerLink="/search" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Search</a>
        <div class="border-t border-black/10 dark:border-white/10 my-2"></div>
        @if (auth.currentUser()) {
          <a routerLink="/profile" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Profile</a>
          <a routerLink="/premium" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Premium</a>
          <button (click)="auth.logout(); closeMobileMenu()" class="text-left px-2 py-3 text-red-700 hover:text-red-800 dark:text-red-300 dark:hover:text-red-200 transition-colors">Sign Out</button>
        } @else {
          <a routerLink="/login" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Sign In</a>
          <a routerLink="/register" (click)="closeMobileMenu()" class="px-2 py-3 hover:text-black dark:hover:text-white transition-colors">Create Account</a>
        }
      </div>
    </div>
  }

  @if (showSearchOverlay()) {
    <div class="fixed inset-0 z-[60] bg-black/70" (click)="showSearchOverlay.set(false)">
      <div class="max-w-2xl mx-auto mt-24 px-4" (click)="$event.stopPropagation()">
        <form (submit)="onSearchSubmit(); $event.preventDefault()" class="rounded-lg border border-black/20 bg-white p-3 dark:border-white/20 dark:bg-black flex items-center gap-3">
          <svg class="w-5 h-5 text-black/60 dark:text-white/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.3-4.3m1.3-5.7a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            #searchInput
            type="text"
            [formControl]="searchForm.controls.query"
            placeholder="Search movies, books, or music..."
            class="w-full bg-transparent text-black dark:text-white placeholder-black/40 dark:placeholder-white/40 outline-none"
          />
          <button type="submit" class="px-3 py-1.5 rounded bg-black text-white dark:bg-white dark:text-black text-sm font-medium">Search</button>
        </form>
      </div>
    </div>
  }
</nav>

# =============================================================================
# NaijasPride — CI/CD Pipeline
# =============================================================================
#
# Trigger: push to `main` branch
#
# Strategy (zero-downtime, Railway-style):
#   1. Build & push Docker image to GHCR (GitHub Container Registry)
#   2. Deploy to DO App Platform via `doctl`
#   3. DO App Platform performs a rolling deploy:
#      - Builds the new instance from the image
#      - Runs health checks on the new instance
#      - Only swaps traffic once health checks pass
#      - If health checks fail, the deploy is marked failed and the OLD
#        instance stays live — your users never see downtime or a broken API
#   4. Workflow fails fast if the deploy itself fails, giving you a clear
#      signal in GitHub without ever taking down the live service
#
# Required GitHub Secrets:
#   DIGITALOCEAN_ACCESS_TOKEN  — DO API token (write access)
#   DO_APP_ID                  — Your DO App ID (get from: doctl apps list)
#   GHCR_PAT                   — GitHub PAT with packages:write (or use GITHUB_TOKEN)
#
# Optional GitHub Secrets (used for Vercel frontend deploy):
#   VERCEL_TOKEN
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:      # Allow manual deploys from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel a running deploy — let it finish

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test & lint (fast gate — runs in parallel with nothing else blocked)
  # ---------------------------------------------------------------------------
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck shared packages
        run: |
          npm run build --workspace @naijaspride/types
          npm run build --workspace @naijaspride/validators

      - name: Typecheck API
        run: npx tsc --noEmit --project apps/api/tsconfig.json

  # ---------------------------------------------------------------------------
  # 2. Deploy API to DigitalOcean App Platform
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API → DigitalOcean
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install doctl (DO's CLI tool)
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # Trigger a new deploy on DO App Platform.
      # DO will:
      #   - Build a fresh image from the Dockerfile
      #   - Start the new instance alongside the old one
      #   - Run health checks (/api/v1/health) on the new instance
      #   - Drain and terminate the old instance only after health checks pass
      #   - If the new instance never becomes healthy, the old one stays alive
      - name: Trigger DigitalOcean App Platform deploy
        id: do_deploy
        run: |
          echo "Triggering deploy for app: ${{ secrets.DO_APP_ID }}"
          DEPLOY_OUTPUT=$(doctl apps create-deployment ${{ secrets.DO_APP_ID }} --format ID --no-header --wait 2>&1)
          echo "deploy_output=$DEPLOY_OUTPUT"
          
          # Extract deployment ID (first non-empty line)
          DEPLOY_ID=$(echo "$DEPLOY_OUTPUT" | head -1 | tr -d '[:space:]')
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deployment ID: $DEPLOY_ID"

      # Poll until the deployment is in a terminal state (ACTIVE or ERROR)
      # DO App Platform's --wait flag handles this, but we add explicit
      # status checking so the CI log is clear about what happened.
      - name: Verify deployment succeeded
        run: |
          APP_ID="${{ secrets.DO_APP_ID }}"
          DEPLOY_ID="${{ steps.do_deploy.outputs.deploy_id }}"
          
          echo "Checking deployment status for: $DEPLOY_ID"
          
          # Give it up to 15 minutes to complete (large image + migration)
          MAX_WAIT=900
          ELAPSED=0
          POLL_INTERVAL=15
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(doctl apps get-deployment "$APP_ID" "$DEPLOY_ID" --format Phase --no-header 2>/dev/null | tr -d '[:space:]' || echo "UNKNOWN")
            echo "[${ELAPSED}s] Deployment phase: $STATUS"
            
            case "$STATUS" in
              ACTIVE)
                echo "Deployment succeeded — new instance is live and healthy"
                exit 0
                ;;
              ERROR|CANCELED|SUPERSEDED)
                echo "Deployment failed with phase: $STATUS"
                echo ""
                echo "Previous deployment is still serving traffic — no downtime occurred."
                echo "Check DO Dashboard for logs: https://cloud.digitalocean.com/apps/$APP_ID/deployments/$DEPLOY_ID"
                exit 1
                ;;
            esac
            
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          
          echo "Timed out waiting for deployment to complete after ${MAX_WAIT}s"
          echo "Check DO Dashboard for status."
          exit 1

      - name: Print deployment URL
        if: success()
        run: |
          echo "API is live at: https://api.naijaspride.com"
          doctl apps get ${{ secrets.DO_APP_ID }} --format DefaultIngress --no-header

  # ---------------------------------------------------------------------------
  # 3. Deploy frontend to Vercel (only if API deploy succeeded)
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    needs: deploy-api
    timeout-minutes: 15
    environment: production

    # Skip if Vercel secrets aren't configured yet
    if: |
      secrets.VERCEL_TOKEN != '' &&
      secrets.VERCEL_ORG_ID != '' &&
      secrets.VERCEL_PROJECT_ID != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull Vercel project settings (framework detection, build settings)
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build Angular app using Vercel's builder
      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy the pre-built output
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print frontend URL
        if: success()
        run: echo "Frontend is live at https://naijaspride.com"

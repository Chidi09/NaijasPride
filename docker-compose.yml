# =============================================================================
# NaijasPride — Production Docker Compose (Hetzner VPS)
# =============================================================================
# One VPS, one compose file, everything you need.
#
# Usage:
#   cp .env.example .env   # fill in your secrets
#   ./deploy.sh             # build + start everything
#
# Services:
#   api              — Fastify HTTP server (includes inline cron jobs)
#   torrent-worker   — BullMQ worker for torrent downloads + transcoding
#   book-worker      — BullMQ worker for book catalog imports
#   redis            — Queue broker + cache
#   flaresolverr     — Cloudflare bypass for manga scraping (optional)
# =============================================================================

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FlareSolverr (optional — comment out if not using scraper manga sources)
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      TZ: ${TZ:-Africa/Lagos}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API Server ─────────────────────────────────────────────────────────────
  # Runs Fastify HTTP server + all inline cron jobs:
  #   - Wrapped stats (monthly/annual)
  #   - New chapter checker
  #   - YouTube channel/music monitors
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      FLARESOLVERR_URL: http://flaresolverr:8191
      TORRENT_DOWNLOAD_DIR: /tmp/naijaspride/torrent-downloads
      FFMPEG_PATH: /usr/bin/ffmpeg
    # Default CMD from Dockerfile: node apps/api/dist/app.js

  # ── Torrent Worker ─────────────────────────────────────────────────────────
  # BullMQ consumer: downloads torrents, transcodes with ffmpeg, uploads to R2
  torrent-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "apps/api/dist/workers/torrent.worker.js"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      TORRENT_DOWNLOAD_DIR: /tmp/naijaspride/torrent-downloads
      FFMPEG_PATH: /usr/bin/ffmpeg
    volumes:
      - torrent_tmp:/tmp/naijaspride

  # ── Remote Ingest Worker ───────────────────────────────────────────────────
  # BullMQ consumer: resolves remote streams and ingests to R2/HLS
  remote-ingest-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "apps/api/dist/workers/remote-ingest.worker.js"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      FLARESOLVERR_URL: http://flaresolverr:8191
      REMOTE_INGEST_TMP_DIR: /tmp/naijaspride/remote-ingest
      REMOTE_INGEST_STREAM_GATEWAY: "true"
      REMOTE_INGEST_JOB_ATTEMPTS: "3"
      REMOTE_INGEST_JOB_BACKOFF_MS: "30000"
      FFMPEG_PATH: /usr/bin/ffmpeg
    volumes:
      - torrent_tmp:/tmp/naijaspride

  # ── Book Import Worker ─────────────────────────────────────────────────────
  # BullMQ consumer: imports books from EpubBooks catalog
  book-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "apps/api/dist/workers/book-import.worker.js"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379

  # ── Elsci Mirror Worker ─────────────────────────────────────────────────────
  # BullMQ consumer: solves Cloudflare challenge and mirrors Elsci files to R2
  elsci-mirror-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "apps/api/dist/workers/elsci-mirror.worker.js"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      FLARESOLVERR_URL: http://flaresolverr:8191

  # ── Book Cover Worker ──────────────────────────────────────────────────────
  # BullMQ consumer: extracts EPUB/PDF covers and uploads to R2
  book-cover-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["node", "apps/api/dist/workers/book-cover.worker.js"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      FFMPEG_PATH: /usr/bin/ffmpeg
      FLARESOLVERR_URL: http://flaresolverr:8191
    volumes:
      - torrent_tmp:/tmp/naijaspride

volumes:
  redis_data:
  torrent_tmp:

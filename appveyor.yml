version: 1.0.{build}
image: Ubuntu

environment:
  nodejs_version: "20"
  # Add these secure variables in your AppVeyor project settings:
  # SSH_PRIVATE_KEY
  # SSH_HOST
  # SSH_USER

init:
  - git config --global core.autocrlf input

install:
  - nvm install $nodejs_version
  - npm install -g npm@11.5.2
  - npm ci --prefer-offline --no-audit

build: off




deploy_script:
  - sh: |
      if [ "$APPVEYOR_REPO_BRANCH" = "main" ]; then
        echo "Setting up SSH for deployment..."
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" | base64 -d -i > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -t rsa,ed25519 $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        echo "Deploying to $SSH_HOST..."
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new $SSH_USER@$SSH_HOST "cd /opt/naijaspride && ./deploy.sh"
        echo "Deployment triggered successfully!"
      else
        echo "Skipping deployment for non-main branch."
      fi

cache:
  - ~/.npm -> package-lock.json
